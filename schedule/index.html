<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Call</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f3e8;
      color: #174f19;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 13px;
      margin-bottom: 12px;
      color: #6b7a66;
    }

    h1 {
      font-size: clamp(36px, 7vw, 68px);
      line-height: 0.95;
      margin: 0 0 18px;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      max-width: 620px;
      margin: 0 auto;
      color: #3f4f3c;
    }

    .calendar-box {
      background: #ffffff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 18px 50px rgba(23, 79, 25, 0.12);
      margin-top: 32px;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      color: #174f19;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">Schedule a Call</div>
      <h1>Let’s find a time to talk.</h1>
      <p class="subtitle">
        Choose a time that works for you and we’ll connect about the retreat, questions, pricing, or anything else you want to ask.
      </p>
    </section>

    <section class="calendar-box">
      <!-- TIDYCAL EMBED: replace this with your real TidyCal path -->
      <div class="tidycal-embed" data-path="yourusername/15-minute-call"></div>
      <script src="https://tidycal.com/js/embed.js" async></script>
    </section>

    <a class="back-link" href="/">← Back to homepage</a>
  </main>
</body>
</html>
