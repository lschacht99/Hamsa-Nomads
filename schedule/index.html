<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Schedule a Call | Hamsa Nomads</title>

  <style>
    :root {
      --cream: #f7f3ea;
      --green: #174f19;
      --gold: #d6a84f;
      --text: #1f351f;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 18px 70px;
    }

    .hero {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 34px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      color: var(--green);
    }

    .subtitle {
      margin: 22px auto 0;
      max-width: 650px;
      font-size: 18px;
      line-height: 1.6;
      color: rgba(31, 53, 31, 0.78);
    }

    .scheduler-frame-wrap {
      background: white;
      border-radius: 32px;
      padding: 10px;
      box-shadow: 0 24px 70px rgba(23, 79, 25, 0.13);
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 1050px;
      border: 0;
      border-radius: 24px;
      background: white;
    }

    .back-link {
      display: inline-block;
      margin-top: 26px;
      color: var(--green);
      font-weight: 700;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .page {
        padding-top: 32px;
      }

      iframe {
        height: 1200px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">Schedule a Call</div>

      <h1>Let’s find a time to talk.</h1>

      <p class="subtitle">
        Pick a quick 10-minute slot to ask about the retreat, rooming, meals,
        the crowd, minyan, pricing, or anything else you want to understand before joining.
      </p>
    </section>

    <section class="scheduler-frame-wrap">
      <iframe
        src="https://script.google.com/macros/s/AKfycby6YCjUZ_IltPp3FL3AvNSann1N5nbPDZegPtBDkDA9FH1xjAYT6ft0BNO3_7Q9O9aZjg/exec"
        loading="lazy">
      </iframe>
    </section>

    <a class="back-link" href="/">← Back to Hamsa Nomads</a>
  </main>
</body>
</html>
